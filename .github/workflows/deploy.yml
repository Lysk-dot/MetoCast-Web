name: Deploy Frontend to Server

on:
  push:
    branches: [Stable]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: Stable
      
      - name: Install Node.js dependencies
        run: npm ci
      
      - name: Build frontend
        run: npm run build
      
      - name: Deploy to Nginx
        run: |
          rm -rf /var/www/bytelair.pro/*
          cp -r dist/* /var/www/bytelair.pro/
          chown -R www-data:www-data /var/www/bytelair.pro/
          chmod -R 755 /var/www/bytelair.pro/
      
      - name: Reload Nginx
        run: |
          systemctl reload nginx
