name: Deploy Frontend to Server

on:
  push:
    branches: [Stable]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: Stable
      
      - name: Deploy with Docker Compose
        run: |
          docker compose down
          docker compose build --no-cache app
          docker compose up -d
      
      - name: Wait for app to be ready
        run: sleep 10
      
      - name: Health check
        run: |
          curl -f http://127.0.0.1:8080 || echo "Warning: health check failed, check logs with: docker compose logs app"
