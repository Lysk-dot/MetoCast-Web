name: Build and Deploy

on:
  push:
    branches:
      - Stable

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/bytelair/metocast

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl apply -f k8s/deployment.yaml
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GHCR_TOKEN }}" \
            -n metocast \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl rollout restart deployment/metocast -n metocast
          kubectl rollout status deployment/metocast -n metocast --timeout=180s

      - name: Prisma DB Push
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          POD=$(kubectl get pod -n metocast -l app=metocast -o jsonpath="{.items[0].metadata.name}")
          kubectl exec -n metocast $POD -- node ./node_modules/prisma/build/index.js db push

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f ~/.kube/config