name: Deploy Frontend to Server

on:
  push:
    branches: [Stable]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: Stable
      
      - name: Setup environment file
        run: |
          cp /home/felipe/.env.metocast .env
      
      - name: Deploy with Docker Compose
        run: |
          docker compose down || true
          docker compose build --no-cache app
          docker compose up -d
      
      - name: Wait for services
        run: sleep 15
      
      - name: Run database migrations
        run: docker compose exec -T app ./node_modules/.bin/prisma db push
      
      - name: Health check
        run: |
          curl -f http://localhost:80 || echo "Warning: health check failed. Check logs: docker compose logs app"
