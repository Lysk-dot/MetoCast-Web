services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      YOUTUBE_CHANNEL_ID: UCnFAxzMvp4ot-uElK_z1qSQ
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-https://metocast.example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - uploads:/app/public/uploads
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/app/public/uploads:ro
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - internal

volumes:
  uploads:

networks:
  internal:
    driver: bridge